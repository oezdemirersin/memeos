<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemeOS — Danke!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b12;--surface:#0f1420;--border:rgba(255,255,255,0.07);--accent:#3b82f6;--success:#22c55e;--text:#e2e8f0;--muted:#64748b;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:90%;}
.check{width:56px;height:56px;background:rgba(34,197,94,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;}
.logo{font-family:var(--font-display);font-size:24px;letter-spacing:2px;margin-bottom:20px;color:var(--muted);}
.logo span{color:var(--accent);}
h2{font-size:22px;margin-bottom:10px;}
p{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">MEME<span>OS</span></div>
  <div class="check">✓</div>
  <h2>Danke!</h2>
  <p>Deine Antworten für <strong>{{ city.name }}</strong> wurden erfolgreich übermittelt und helfen uns dabei, bessere lokale Memes zu erstellen.</p>
</div>
</body>
</html>
