services:
  - type: web
    name: memeos
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CANVA_CLIENT_ID
        sync: false
      - key: CANVA_CLIENT_SECRET
        sync: false
      - key: CANVA_REFRESH_TOKEN
        sync: false
      - key: CONTENT_OS_URL
        sync: false
      - key: CONTENT_OS_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: memeos-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
